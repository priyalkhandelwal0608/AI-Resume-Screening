<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Resume Screening</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>📄 AI Resume Screening</h1>
        
        <form action="/" method="post" enctype="multipart/form-data">
            <div class="section">
                <label>Job Description</label>
                <textarea name="job_description" placeholder="Paste requirements here...">{{ demo_jd if demo_used else '' }}</textarea>
            </div>

            <div class="section">
                <label>Upload Resumes (PDF)</label>
                <input type="file" name="resume_files" multiple accept=".pdf">
                <p class="divider">— OR —</p>
                <textarea name="resumes" placeholder="Paste manual text here..."></textarea>
            </div>

            <div class="section settings">
                <label>Algorithm:</label>
                <select name="method">
                    <option value="tfidf">TF-IDF (Keyword Match)</option>
                    <option value="bert">SBERT (Contextual Meaning)</option>
                </select>
            </div>

            <div class="actions">
                <input type="hidden" name="is_demo" id="is_demo_input" value="false">
                <button type="submit" class="btn-primary" onclick="document.getElementById('is_demo_input').value='false';">Rank Resumes</button>
                <button type="submit" class="btn-demo" onclick="document.getElementById('is_demo_input').value='true';">🚀 Run Demo</button>
            </div>
        </form>

        {% if results %}
        <div class="results">
            <hr>
            <h2>Ranking Results ({{ method }})</h2>
            <table>
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Candidate</th>
                        <th>Match Score</th>
                    </tr>
                </thead>
                <tbody>
                    {% for res in results %}
                    <tr class="{% if loop.first %}top{% endif %}">
                        <td>#{{ loop.index }}</td>
                        <td><strong>{{ res.name }}</strong></td>
                        <td>
                            <div class="score-container">
                                <span class="score-text">{{ res.score }}</span>
                                <div class="bar-bg">
                                    <div class="bar-fill" style="width: {{ res.score }}%;"></div>
                                </div>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        {% endif %}
    </div>
</body>
</html>
